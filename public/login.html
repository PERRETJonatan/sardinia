<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sardigna</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-app min-h-dvh">
  <header class="flex items-center gap-3 px-5 py-3.5 bg-white border-b border-rim sticky top-0 z-[100]">
    <a href="/" class="btn btn-ghost">← Back</a>
    <h1 class="flex-1 text-xl font-bold">Admin Login</h1>
  </header>

  <main class="max-w-lg mx-auto px-5 py-6 flex flex-col gap-4">
    <form id="login-form" class="flex flex-col gap-4">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autocapitalize="none" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" id="submit-btn" class="btn-primary">Log in</button>
    </form>

    <div id="error-banner" hidden class="bg-red-50 text-danger border border-red-200 px-3.5 py-2.5 rounded-[10px] text-sm"></div>
  </main>

  <script>
    fetch('/api/me').then(r => r.json()).then(data => {
      if (data.admin) window.location.replace('/');
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const error = document.getElementById('error-banner');
      error.hidden = true;
      btn.disabled = true;
      btn.textContent = 'Logging in…';

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        }),
      });

      if (res.ok) {
        const next = new URLSearchParams(location.search).get('next') || '/';
        window.location.replace(next);
      } else {
        const data = await res.json();
        error.textContent = data.error ?? 'Login failed';
        error.hidden = false;
        btn.disabled = false;
        btn.textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
