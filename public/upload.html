<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload — Sardigna</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.cjs"></script>
</head>
<body class="bg-app min-h-dvh">
  <header class="flex items-center gap-3 px-5 py-3.5 bg-white border-b border-rim sticky top-0 z-[100]">
    <a href="/" class="btn btn-ghost">← Back</a>
    <h1 class="flex-1 text-xl font-bold">Upload Photo</h1>
  </header>

  <main class="max-w-lg mx-auto px-5 py-6 flex flex-col gap-4">
    <form id="upload-form" class="flex flex-col gap-4">
      <label id="drop-zone" for="file-input" class="block border-2 border-dashed border-rim rounded-[10px] cursor-pointer transition-colors hover:border-accent hover:bg-green-50/40 overflow-hidden">
        <div id="preview-wrap" class="min-h-[220px] flex flex-col items-center justify-center gap-3 p-6">
          <svg id="upload-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-12 h-12 text-muted">
            <path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
          </svg>
          <p id="drop-label" class="text-muted text-[0.95rem] text-center leading-snug">Tap to choose from your photo library</p>
          <img id="preview-img" src="" alt="" hidden class="w-full max-h-[320px] object-contain rounded-[8px]">
        </div>
      </label>

      <input type="file" id="file-input" name="image" accept="image/*" hidden>
      <input type="file" id="camera-input" name="image" accept="image/*" capture="environment" hidden>

      <button type="button" id="camera-btn" class="btn btn-ghost justify-center text-sm">Take a new photo instead</button>

      <div id="gps-status" class="flex items-center gap-2 text-sm text-muted px-3 py-2 bg-white border border-rim rounded-[10px]">
        <span>📍</span>
        <span id="gps-text">Waiting for location…</span>
      </div>

      <p id="compress-info" hidden class="text-xs text-muted text-center"></p>

      <button type="submit" id="submit-btn" class="btn-primary" disabled>Upload</button>
    </form>

    <div id="result" hidden class="flex flex-col items-center gap-4 py-8 text-center">
      <div class="w-14 h-14 rounded-full bg-green-100 text-accent text-3xl flex items-center justify-center">✓</div>
      <p id="result-msg" class="text-muted text-[0.95rem]"></p>
      <div class="flex gap-2.5 flex-wrap justify-center">
        <a href="/" class="btn">View Gallery</a>
        <button id="upload-another" class="btn btn-ghost">Upload Another</button>
      </div>
    </div>

    <div id="error-banner" hidden class="bg-red-50 text-danger border border-red-200 px-3.5 py-2.5 rounded-[10px] text-sm"></div>
  </main>

  <script>
    fetch('/api/me').then(r => r.json()).then(data => {
      if (!data.admin) window.location.replace('/login.html?next=/upload.html');
    });

    const fileInput    = document.getElementById('file-input');
    const cameraInput  = document.getElementById('camera-input');
    const previewImg   = document.getElementById('preview-img');
    const uploadIcon   = document.getElementById('upload-icon');
    const dropLabel    = document.getElementById('drop-label');
    const submitBtn    = document.getElementById('submit-btn');
    const gpsText      = document.getElementById('gps-text');
    const compressInfo = document.getElementById('compress-info');
    const form         = document.getElementById('upload-form');
    const result       = document.getElementById('result');
    const errorBanner  = document.getElementById('error-banner');

    let activeInput    = fileInput;
    let currentPos     = null;  // from browser geolocation
    let exifPos        = null;  // from photo EXIF
    let compressedFile = null;

    // ── Geolocation ──────────────────────────────────────────────────────────

    function updateGpsDisplay() {
      if (exifPos) {
        gpsText.textContent = `From photo: ${exifPos.lat.toFixed(5)}, ${exifPos.lng.toFixed(5)}`;
      } else if (currentPos) {
        gpsText.textContent = `From device: ${currentPos.lat.toFixed(5)}, ${currentPos.lng.toFixed(5)} (±${currentPos.acc}m)`;
      } else {
        gpsText.textContent = 'No location found';
      }
    }

    if (navigator.geolocation) {
      navigator.geolocation.watchPosition(
        (pos) => {
          currentPos = {
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            acc: Math.round(pos.coords.accuracy),
          };
          if (!exifPos) updateGpsDisplay();
        },
        (err) => {
          currentPos = null;
          if (!exifPos) {
            gpsText.textContent = err.code === 1
              ? 'Location denied — photos will be saved without coordinates'
              : 'Could not get location';
          }
        },
        { enableHighAccuracy: true, maximumAge: 10000 }
      );
    } else {
      gpsText.textContent = 'Location not supported by this browser';
    }

    // ── Image compression ─────────────────────────────────────────────────────

    function fmt(bytes) {
      return bytes >= 1024 * 1024
        ? `${(bytes / 1024 / 1024).toFixed(1)} MB`
        : `${Math.round(bytes / 1024)} KB`;
    }

    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          URL.revokeObjectURL(url);
          const MAX = 1920;
          let w = img.naturalWidth, h = img.naturalHeight;
          if (w > MAX || h > MAX) {
            const s = Math.min(MAX / w, MAX / h);
            w = Math.round(w * s);
            h = Math.round(h * s);
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          canvas.toBlob(blob => {
            if (!blob) { reject(new Error('Compression failed')); return; }
            resolve(new File([blob], file.name.replace(/\.[^.]+$/, '') + '.jpg', {
              type: 'image/jpeg', lastModified: file.lastModified,
            }));
          }, 'image/jpeg', 0.82);
        };
        img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Image load failed')); };
        img.src = url;
      });
    }

    // ── File selection ────────────────────────────────────────────────────────

    async function onFileSelected(input) {
      const file = input.files[0];
      if (!file) return;
      activeInput = input;
      exifPos = null;
      compressedFile = null;
      compressInfo.hidden = true;
      submitBtn.disabled = true;

      previewImg.src = URL.createObjectURL(file);
      previewImg.hidden = false;
      uploadIcon.hidden = true;
      dropLabel.hidden = true;
      gpsText.textContent = 'Processing…';

      // Extract GPS from EXIF before canvas strips it
      if (typeof exifr !== 'undefined') {
        try {
          const gps = await exifr.gps(file);
          if (gps) exifPos = { lat: gps.latitude, lng: gps.longitude };
        } catch {}
      }

      // Compress with canvas
      try {
        const orig = file.size;
        compressedFile = await compressImage(file);
        const comp = compressedFile.size;
        const pct = Math.round((1 - comp / orig) * 100);
        compressInfo.textContent = `${fmt(orig)} → ${fmt(comp)}${pct > 5 ? ` · ${pct}% smaller` : ''}`;
        compressInfo.hidden = false;
      } catch {
        compressedFile = file;
      }

      updateGpsDisplay();
      submitBtn.disabled = false;
    }

    fileInput.addEventListener('change', () => onFileSelected(fileInput));
    cameraInput.addEventListener('change', () => onFileSelected(cameraInput));
    document.getElementById('camera-btn').addEventListener('click', () => cameraInput.click());

    // ── Upload ────────────────────────────────────────────────────────────────

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const file = compressedFile || activeInput.files[0];
      if (!file) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Uploading…';
      errorBanner.hidden = true;

      const data = new FormData();
      data.append('image', file);
      const gpsToSend = exifPos || currentPos;
      if (gpsToSend) {
        data.append('lat', gpsToSend.lat);
        data.append('lng', gpsToSend.lng);
      }

      try {
        const res = await fetch('/api/upload', { method: 'POST', body: data });
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        const json = await res.json();

        form.hidden = true;
        result.hidden = false;
        document.getElementById('result-msg').textContent = json.lat != null
          ? `Photo saved at ${json.lat.toFixed(5)}, ${json.lng.toFixed(5)}`
          : 'Photo saved without location.';
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Upload';
        errorBanner.textContent = `Upload failed: ${err.message}`;
        errorBanner.hidden = false;
      }
    });

    document.getElementById('upload-another').addEventListener('click', () => {
      form.hidden = false;
      result.hidden = true;
      fileInput.value = '';
      cameraInput.value = '';
      previewImg.hidden = true;
      previewImg.src = '';
      uploadIcon.hidden = false;
      dropLabel.hidden = false;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Upload';
      activeInput = fileInput;
      exifPos = null;
      compressedFile = null;
      compressInfo.hidden = true;
      updateGpsDisplay();
    });
  </script>
</body>
</html>
