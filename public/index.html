<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sardigna</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body class="h-dvh flex flex-col bg-app overflow-hidden">

  <header class="h-14 flex-shrink-0 flex items-center gap-3 px-5 bg-white border-b border-rim z-[100]">
    <h1 class="flex-1 text-xl font-bold">Sardigna</h1>
    <nav id="header-nav"></nav>
  </header>

  <div class="flex-1 flex flex-col md:flex-row overflow-hidden">

    <!-- Right: map + detail — top on mobile, right on desktop -->
    <div id="right-panel"
         class="flex-shrink-0 h-[260px] flex flex-col
                md:order-2 md:w-1/2 md:h-auto
                transition-[height] duration-300 ease-in-out">

      <!-- Detail panel (hidden until an image is selected) -->
      <div id="detail-panel"
           class="hidden flex-col flex-shrink-0 bg-white border-b border-rim">
        <div class="relative bg-stone-950 flex-shrink-0">
          <img id="detail-img" src="" alt=""
               class="w-full h-48 md:h-60 object-contain">
          <button id="detail-close"
                  class="absolute top-2.5 right-2.5 w-8 h-8 rounded-full bg-black/50 text-white flex items-center justify-center text-xl leading-none hover:bg-black/70 transition-colors">
            &times;
          </button>
        </div>
        <div id="detail-info" class="px-4 py-3 flex flex-col gap-1 min-w-0"></div>
      </div>

      <!-- Map fills remaining height -->
      <div id="map" class="flex-1 min-h-0"></div>
    </div>

    <!-- Left: image grid — bottom on mobile, left on desktop -->
    <aside class="flex-1 overflow-y-auto p-3 md:order-1 md:w-1/2 md:flex-none">
      <div id="gallery"
           class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-2">
      </div>
      <p id="empty-state" hidden class="text-muted py-10 text-center text-sm">No photos yet.</p>
    </aside>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(map);

    let markers = [];
    let selectedId = null;
    let isAdmin = false;
    let allImages = [];

    async function init() {
      const me = await fetch('/api/me').then(r => r.json());
      isAdmin = me.admin;

      const nav = document.getElementById('header-nav');
      if (isAdmin) {
        nav.innerHTML = `
          <a href="/upload.html" class="btn">+ Upload</a>
          <button id="logout-btn" class="btn btn-ghost">${me.username} · Log out</button>
        `;
        document.getElementById('logout-btn').addEventListener('click', async () => {
          await fetch('/api/logout', { method: 'POST' });
          location.reload();
        });
      } else {
        nav.innerHTML = `<a href="/login.html" class="btn btn-ghost">Admin</a>`;
      }

      loadImages();
    }

    async function loadImages() {
      allImages = await fetch('/api/images').then(r => r.json());
      renderGallery();
      renderMarkers();
    }

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      const emptyState = document.getElementById('empty-state');
      gallery.innerHTML = '';

      if (allImages.length === 0) {
        emptyState.hidden = false;
        return;
      }
      emptyState.hidden = true;

      for (const img of allImages) {
        const card = document.createElement('div');
        card.className = 'card' + (img.id === selectedId ? ' card-selected' : '');
        card.dataset.id = img.id;
        card.innerHTML = `
          <img src="/uploads/${img.filename}"
               alt="${img.original_name}"
               loading="lazy"
               class="w-full aspect-square object-cover">
          ${img.lat != null
            ? `<span class="absolute bottom-1.5 left-1.5 text-[10px] bg-black/50 text-white px-1.5 py-0.5 rounded-full leading-tight">📍</span>`
            : ''}
          ${isAdmin
            ? `<button class="delete-btn">&times;</button>`
            : ''}
        `;
        card.addEventListener('click', () => selectImage(img));
        if (isAdmin) {
          card.querySelector('.delete-btn').addEventListener('click', e => {
            e.stopPropagation();
            deleteImage(img.id);
          });
        }
        gallery.appendChild(card);
      }
    }

    function renderMarkers() {
      markers.forEach(m => m.remove());
      markers = [];

      const geo = allImages.filter(i => i.lat != null && i.lng != null);
      for (const img of geo) {
        const m = L.marker([img.lat, img.lng]).addTo(map);
        m.bindTooltip(img.original_name);
        m.on('click', () => selectImage(img));
        markers.push(m);
      }

      if (geo.length > 0 && selectedId == null) {
        map.fitBounds(L.latLngBounds(geo.map(i => [i.lat, i.lng])), {
          padding: [40, 40], maxZoom: 14,
        });
      }
    }

    function selectImage(img) {
      if (selectedId === img.id) { deselectImage(); return; }
      selectedId = img.id;

      // Highlight selected card
      document.querySelectorAll('.card').forEach(c =>
        c.classList.toggle('card-selected', +c.dataset.id === img.id)
      );

      // Populate detail panel
      document.getElementById('detail-img').src = `/uploads/${img.filename}`;
      document.getElementById('detail-info').innerHTML = `
        <p class="font-semibold text-sm truncate">${img.original_name}</p>
        ${img.lat != null
          ? `<p class="text-xs text-muted tabular-nums">${img.lat.toFixed(6)}, ${img.lng.toFixed(6)}</p>`
          : `<p class="text-xs text-muted italic">No location data</p>`}
        <p class="text-xs text-muted">${new Date(img.created_at + 'Z').toLocaleString()}</p>
      `;
      const detail = document.getElementById('detail-panel');
      detail.classList.remove('hidden');
      detail.classList.add('flex');

      // Expand right panel on mobile to fit detail + map
      if (window.innerWidth < 768) {
        document.getElementById('right-panel').style.height = '430px';
      }

      // Resize map, then fly
      setTimeout(() => {
        map.invalidateSize();
        if (img.lat != null && img.lng != null) {
          map.flyTo([img.lat, img.lng], 14, { duration: 1.2 });
        }
      }, 50);

      // Scroll card into view
      setTimeout(() => {
        document.querySelector(`.card[data-id="${img.id}"]`)
          ?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 100);
    }

    function deselectImage() {
      selectedId = null;
      document.querySelectorAll('.card').forEach(c => c.classList.remove('card-selected'));

      const detail = document.getElementById('detail-panel');
      detail.classList.add('hidden');
      detail.classList.remove('flex');

      if (window.innerWidth < 768) {
        document.getElementById('right-panel').style.height = '';
      }

      setTimeout(() => {
        map.invalidateSize();
        const geo = allImages.filter(i => i.lat != null && i.lng != null);
        if (geo.length > 0) {
          map.flyToBounds(L.latLngBounds(geo.map(i => [i.lat, i.lng])), {
            padding: [40, 40], maxZoom: 14, duration: 1,
          });
        }
      }, 50);
    }

    document.getElementById('detail-close').addEventListener('click', deselectImage);

    async function deleteImage(id) {
      if (!confirm('Delete this photo?')) return;
      await fetch(`/api/images/${id}`, { method: 'DELETE' });
      if (selectedId === id) deselectImage();
      loadImages();
    }

    init();
  </script>
</body>
</html>
