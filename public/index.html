<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sardigna</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body class="h-dvh flex flex-col bg-app overflow-hidden">

  <header class="h-14 flex-shrink-0 flex items-center gap-3 px-5 bg-white border-b border-rim z-[100]">
    <h1 class="flex-1 text-xl font-bold">Sardigna</h1>
    <nav id="header-nav"></nav>
  </header>

  <div class="flex-1 flex flex-col md:flex-row overflow-hidden">

    <!-- Right: map — top on mobile, right on desktop -->
    <div class="flex-shrink-0 h-[260px] md:order-2 md:w-1/2 md:h-auto">
      <div id="map" class="w-full h-full"></div>
    </div>

    <!-- Left: image grid — bottom on mobile, left on desktop -->
    <aside class="flex-1 overflow-y-auto p-3 md:order-1 md:w-1/2 md:flex-none">
      <div id="gallery"
           class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-2">
      </div>
      <p id="empty-state" hidden class="text-muted py-10 text-center text-sm">No photos yet.</p>
    </aside>

  </div>

  <!-- Lightbox -->
  <div id="lightbox" hidden
       class="fixed inset-0 z-[2000] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
    <button id="lightbox-close"
            class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/15 text-white flex items-center justify-center text-2xl leading-none hover:bg-white/25 transition-colors">
      &times;
    </button>

    <div class="flex flex-col md:flex-row gap-4 w-full max-w-5xl max-h-[90dvh]">
      <!-- Image -->
      <div class="flex-1 min-h-0 flex items-center justify-center">
        <img id="lightbox-img" src="" alt=""
             class="max-w-full max-h-[60dvh] md:max-h-[85dvh] rounded-xl object-contain shadow-2xl">
      </div>

      <!-- Right column: mini-map + info -->
      <div class="md:w-64 md:flex-shrink-0 flex flex-col gap-3 min-h-0">
        <!-- Mini map (hidden when no GPS) -->
        <div id="lb-map-wrap" hidden class="rounded-xl overflow-hidden h-48 flex-shrink-0">
          <div id="lb-map" class="w-full h-full"></div>
        </div>

        <!-- Info -->
        <div class="bg-white/10 backdrop-blur rounded-xl p-4 flex flex-col gap-2 text-white">
          <p id="lb-name" class="font-semibold text-base leading-snug"></p>
          <div id="lb-coords" class="text-sm text-white/70 tabular-nums"></div>
          <p id="lb-date" class="text-xs text-white/50"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([20, 0], 2);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: '© <a href="https://www.esri.com">Esri</a>, Maxar, Earthstar Geographics',
      maxZoom: 19,
    }).addTo(map);

    let markers = [];
    let selectedId = null;
    let isAdmin = false;
    let allImages = [];

    // Modal map — created once, reused on every open
    let lbMap = null;
    let lbMarker = null;

    function getModalMap() {
      if (lbMap) return lbMap;
      lbMap = L.map('lb-map', { zoomControl: false, attributionControl: false });
      L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(lbMap);
      return lbMap;
    }

    async function init() {
      const me = await fetch('/api/me').then(r => r.json());
      isAdmin = me.admin;

      const nav = document.getElementById('header-nav');
      if (isAdmin) {
        nav.innerHTML = `
          <a href="/upload.html" class="btn">+ Upload</a>
          <button id="logout-btn" class="btn btn-ghost">${me.username} · Log out</button>
        `;
        document.getElementById('logout-btn').addEventListener('click', async () => {
          await fetch('/api/logout', { method: 'POST' });
          location.reload();
        });
      } else {
        nav.innerHTML = `<a href="/login.html" class="btn btn-ghost">Admin</a>`;
      }

      loadImages();
    }

    async function loadImages() {
      allImages = await fetch('/api/images').then(r => r.json());
      renderGallery();
      renderMarkers();
    }

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      const emptyState = document.getElementById('empty-state');
      gallery.innerHTML = '';

      if (allImages.length === 0) {
        emptyState.hidden = false;
        return;
      }
      emptyState.hidden = true;

      for (const img of allImages) {
        const card = document.createElement('div');
        card.className = 'card' + (img.id === selectedId ? ' card-selected' : '');
        card.dataset.id = img.id;
        card.innerHTML = `
          <img src="/uploads/thumbs/${img.filename}"
               alt="${img.original_name}"
               loading="lazy"
               decoding="async"
               class="w-full aspect-square object-cover">
          ${img.lat != null
            ? `<span class="absolute bottom-1.5 left-1.5 text-[10px] bg-black/50 text-white px-1.5 py-0.5 rounded-full leading-tight">📍</span>`
            : ''}
          ${isAdmin ? `<button class="delete-btn">&times;</button>` : ''}
        `;
        card.addEventListener('click', () => openLightbox(img));
        if (isAdmin) {
          card.querySelector('.delete-btn').addEventListener('click', e => {
            e.stopPropagation();
            deleteImage(img.id);
          });
        }
        gallery.appendChild(card);
      }
    }

    function renderMarkers() {
      markers.forEach(m => m.remove());
      markers = [];

      const geo = allImages.filter(i => i.lat != null && i.lng != null);
      for (const img of geo) {
        const m = L.marker([img.lat, img.lng]).addTo(map);
        m.bindTooltip(img.original_name);
        m.on('click', () => openLightbox(img));
        markers.push(m);
      }

      if (geo.length > 0) {
        map.fitBounds(L.latLngBounds(geo.map(i => [i.lat, i.lng])), {
          padding: [40, 40], maxZoom: 14,
        });
      }
    }

    function openLightbox(img) {
      selectedId = img.id;

      // Highlight card
      document.querySelectorAll('.card').forEach(c =>
        c.classList.toggle('card-selected', +c.dataset.id === img.id)
      );

      // Fill lightbox
      document.getElementById('lightbox-img').src = `/uploads/${img.filename}`;
      document.getElementById('lb-name').textContent = img.original_name;
      document.getElementById('lb-date').textContent =
        new Date(img.created_at + 'Z').toLocaleString();
      document.getElementById('lb-coords').innerHTML = img.lat != null
        ? `📍 ${img.lat.toFixed(6)}, ${img.lng.toFixed(6)}`
        : `<span class="italic">No location data</span>`;

      document.getElementById('lightbox').hidden = false;

      // Fly main map to location
      if (img.lat != null && img.lng != null) {
        map.flyTo([img.lat, img.lng], 14, { duration: 1.2 });
      }

      // Update modal map
      const mapWrap = document.getElementById('lb-map-wrap');
      if (img.lat != null && img.lng != null) {
        mapWrap.hidden = false;
        const modalMap = getModalMap();
        if (lbMarker) lbMarker.remove();
        lbMarker = L.marker([img.lat, img.lng]).addTo(modalMap);
        // invalidateSize after the hidden element becomes visible
        setTimeout(() => {
          modalMap.invalidateSize();
          modalMap.setView([img.lat, img.lng], 14);
        }, 30);
      } else {
        mapWrap.hidden = true;
      }
    }

    function closeLightbox() {
      document.getElementById('lightbox').hidden = true;
      document.querySelectorAll('.card').forEach(c => c.classList.remove('card-selected'));
      selectedId = null;

      const geo = allImages.filter(i => i.lat != null && i.lng != null);
      if (geo.length > 0) {
        map.flyToBounds(L.latLngBounds(geo.map(i => [i.lat, i.lng])), {
          padding: [40, 40], maxZoom: 14, duration: 1,
        });
      }
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeLightbox();
    });

    // Keyboard: Escape closes, arrows navigate
    document.addEventListener('keydown', e => {
      if (document.getElementById('lightbox').hidden) return;
      if (e.key === 'Escape') { closeLightbox(); return; }
      if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
        const idx = allImages.findIndex(i => i.id === selectedId);
        const next = e.key === 'ArrowRight'
          ? allImages[(idx + 1) % allImages.length]
          : allImages[(idx - 1 + allImages.length) % allImages.length];
        openLightbox(next);
      }
    });

    async function deleteImage(id) {
      if (!confirm('Delete this photo?')) return;
      await fetch(`/api/images/${id}`, { method: 'DELETE' });
      if (selectedId === id) closeLightbox();
      loadImages();
    }

    init();
  </script>
</body>
</html>
